<style>
:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: #888580;
  --accent: #c8a96e;
  --accent2: #8b5e3c;
  --green: #4a7c59;
  --green-light: #6db98a;
  --red: #7c4a4a;
  --red-light: #c47a7a;
  --blue: #4a6a8a;
  --blue-light: #7aaac8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  padding: 48px 40px 32px;
  border-bottom: 0.5px solid var(--border);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.title-block {}
.eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 5vw, 48px); font-weight: 300; line-height: 1.1; color: var(--text); }
.title em { font-style: italic; color: var(--accent); }
.stats-row { display: flex; gap: 24px; margin-top: 24px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--accent); line-height: 1; }
.stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

/* Tabs */
.tabs-wrap { padding: 0 40px; border-bottom: 0.5px solid var(--border); display: flex; gap: 0; }
.tab-btn {
  padding: 18px 32px; font-family: 'Manrope', sans-serif; font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase; background: none; border: none;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; margin-bottom: -0.5px;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* Layout */
.main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 180px); }

/* Sidebar */
.sidebar {
  border-right: 0.5px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 180px);
  position: sticky;
  top: 0;
}
.sidebar-search {
  padding: 16px 20px;
  border-bottom: 0.5px solid var(--border);
}
.sidebar-search input {
  width: 100%; background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: 'Manrope', sans-serif;
  font-size: 12px; outline: none;
}
.sidebar-search input::placeholder { color: var(--muted); }
.sidebar-search input:focus { border-color: var(--accent); }
.person-item {
  padding: 14px 20px; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 12px;
}
.person-item:hover { background: var(--surface2); }
.person-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }
.person-av {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0;
  font-family: 'Manrope', sans-serif;
}
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 13px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.person-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.person-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.pbadge { font-size: 9px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
.pb-yes { background: rgba(74,124,89,0.25); color: var(--green-light); }
.pb-no { background: rgba(124,74,74,0.2); color: var(--red-light); }
.pb-blue { background: rgba(74,106,138,0.25); color: var(--blue-light); }

/* Detail */
.detail { padding: 40px; overflow-y: auto; max-height: calc(100vh - 180px); }
.detail-header { margin-bottom: 32px; }
.detail-av-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.detail-av {
  width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 22px; font-weight: 400; font-family: 'Cormorant Garamond', serif;

.detail-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text); line-height: 1.2; }
.detail-ts { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.04em; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.dbadge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 400; }
.db-yes { background: rgba(74,124,89,0.2); color: var(--green-light); border: 0.5px solid rgba(74,124,89,0.4); }
.db-no { background: rgba(124,74,74,0.15); color: var(--red-light); border: 0.5px solid rgba(124,74,74,0.3); }
.db-accent { background: rgba(200,169,110,0.1); color: var(--accent); border: 0.5px solid rgba(200,169,110,0.3); }
.db-blue { background: rgba(74,106,138,0.2); color: var(--blue-light); border: 0.5px solid rgba(74,106,138,0.4); }

/* Fields grid */
.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.field.full { grid-column: 1 / -1; }
.field-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.field-value { font-size: 13px; color: var(--text); line-height: 1.6; font-weight: 300; }

/* Photo viewer */
.photo-group { margin-top: 6px; }
.photo-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
.photo-thumb-btn {
  display: inline-flex; align-items: center; gap: 5px;

  border: 0.5px solid var(--border2); background: var(--surface2);

.photo-thumb-btn.active { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--text); }
.photo-preview {

  border: 0.5px solid var(--border2); background: var(--surface2);
  display: none;
}
.photo-preview.visible { display: block; }
.photo-preview iframe {

}
.photo-preview-loading {

  font-size: 12px; color: var(--muted);
}
.photo-open-link {
  display: block; text-align: right; font-size: 10px; color: var(--muted);
  padding: 6px 10px; border-top: 0.5px solid var(--border); text-decoration: none;
  letter-spacing: 0.05em;
}
.photo-open-link:hover { color: var(--accent); }
.no-photo { font-size: 12px; color: var(--muted); font-style: italic; }

/* Nav arrows */
.nav-arrows { display: flex; gap: 8px; margin-top: 32px; padding-top: 24px; border-top: 0.5px solid var(--border); }
.arrow-btn {
  padding: 8px 20px; background: var(--surface); border: 0.5px solid var(--border2);

.arrow-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.arrow-btn:disabled { opacity: 0.25; cursor: default; }
.arrow-pos { font-size: 12px; color: var(--muted); display: flex; align-items: center; margin-left: 8px; }

/* Section divider */
.section-title {

  padding: 12px 20px 8px; font-weight: 500;
}

/* Empty */
.empty { padding: 60px 40px; text-align: center; color: var(--muted); font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

@media (max-width: 768px) {

  .dbadge { font-size: 10px; padding: 2px 8px; }

@media (max-width: 400px) {

function ini(n){const p=n.trim().split(" ");return(p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();}
function gdrivePrev(url){
  let id=null;
  const m1=url.match(/[?&]id=([^&]+)/);
  const m2=url.match(/\/file\/d\/([^/]+)/);
  if(m1)id=m1[1];else if(m2)id=m2[1];
  return id?`https://drive.google.com/file/d/${id}/preview`:url;
}
let _vc=0;
function buildPhotoViewer(urls,groupLabel){
  if(!urls||!urls.length||!urls[0])return'<span class="no-photo">—</span>';
  const gid="pv"+(_vc++);
  const btns=urls.map((u,i)=>{
    const lbl=urls.length>1?`${groupLabel} ${i+1}`:groupLabel;
    return`<button class="photo-thumb-btn" onclick="showPhoto('${gid}','${u}',this)">${lbl}</button>`;
  }).join("");
  return`<div class="photo-group">
    <div class="photo-thumbs">${btns}</div>
    <div class="photo-preview" id="${gid}">
      <div class="photo-preview-loading" id="${gid}-load">Загрузка...</div>
      <iframe id="${gid}-frame" style="display:none" allowfullscreen></iframe>
      <a class="photo-open-link" id="${gid}-link" href="#" target="_blank">Открыть в Google Drive ↗</a>
    </div>
  </div>`;
}
function showPhoto(gid,url,btn){
  const preview=document.getElementById(gid);
  const frame=document.getElementById(gid+"-frame");
  const load=document.getElementById(gid+"-load");
  const link=document.getElementById(gid+"-link");
  const allBtns=preview.previousElementSibling.querySelectorAll(".photo-thumb-btn");
  const isActive=btn.classList.contains("active");
  allBtns.forEach(b=>b.classList.remove("active"));
  if(isActive){preview.classList.remove("visible");frame.src="";return;}
  btn.classList.add("active");
  preview.classList.add("visible");
  load.style.display="flex";frame.style.display="none";
  frame.onload=()=>{load.style.display="none";frame.style.display="block";};
  frame.src=gdrivePrev(url);
  link.href=url;
}

let curTab="designers", curIdx=0, filtered=[];

function switchTab(t){
  curTab=t; curIdx=0;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",(i===0&&t==="designers")||(i===1&&t==="models"));
  });
  document.getElementById("search").value="";
  filterList();
}

function getList(){ return curTab==="designers"?designers:models; }

function filterList(){
  const q=document.getElementById("search").value.toLowerCase();
  const list=getList();
  filtered=list.filter(d=>d.name.toLowerCase().includes(q));
  if(curIdx>=filtered.length) curIdx=0;
  renderList();
  if(filtered.length) renderDetail(filtered[curIdx], curIdx);
  else document.getElementById("detail").innerHTML=`<div class="empty">Никого не найдено</div>`;
}

function renderList(){
  const el=document.getElementById("list");
  if(!filtered.length){el.innerHTML="";return;}
  el.innerHTML=filtered.map((d,i)=>{
    const av=avPalette[i%avPalette.length];
    const isModel=curTab==="models";
    const badge1=isModel
      ?(d.podium==="Да"?`<span class="pbadge pb-yes">Опыт подиума</span>`:`<span class="pbadge pb-blue">${d.size}</span>`)
      :(d.exp==="Да"?`<span class="pbadge pb-yes">Есть опыт</span>`:`<span class="pbadge pb-no">Без опыта</span>`);
    const tattBadge=isModel&&d.tattoo&&d.tattoo!=="Нет"?`<span class="pbadge pb-no">Тату</span>`:"";
    return`<div class="person-item${i===curIdx?" active":""}" onclick="selectPerson(${i})">
      <div class="person-av" style="background:${av.bg};color:${av.c}">${ini(d.name)}</div>
      <div class="person-info">
        <div class="person-name">${d.name}</div>
        <div class="person-sub">${d.city}</div>
        <div class="person-badges">${badge1}${tattBadge}</div>
      </div>
    </div>`;
  }).join("");
}

function selectPerson(i){
  curIdx=i;
  renderList();
  renderDetail(filtered[i],i);
}

function renderDetail(d,i){
  const av=avPalette[i%avPalette.length];
  const isModel=curTab==="models";
  let badges="";
  let fields="";

  if(!isModel){
    badges=`
      <span class="dbadge ${d.exp==="Да"?"db-yes":"db-no"}">${d.exp==="Да"?"✓ Есть опыт":"Без опыта"}</span>
      <span class="dbadge db-accent">Присутствует: ${d.attend}</span>`;
    const photoHtml=d.photos&&d.photos.length
      ?buildPhotoViewer(d.photos,"Работа")
      :`<span class="no-photo">Фотографии не прикреплены</span>`;
    fields=`
      <div class="field"><div class="field-label">Дата рождения</div><div class="field-value">${d.dob}</div></div>
      <div class="field"><div class="field-label">Город</div><div class="field-value">${d.city}</div></div>
      <div class="field full"><div class="field-label">Время на один образ</div><div class="field-value">${d.time}</div></div>
      <div class="field full"><div class="field-label">Почему хочет участвовать</div><div class="field-value">${d.why}</div></div>
      <div class="field full"><div class="field-label">Фотографии работ</div><div class="field-value"><div class="photo-links">${photoHtml}</div></div></div>
      <div class="field full"><div class="field-label">Контакты</div><div class="field-value" style="white-space:pre-line;font-size:12px">${d.contacts}</div></div>`;
  } else {
    const hasTat=d.tattoo&&d.tattoo!=="Нет"&&!d.tattoo.startsWith("Нет");
    badges=`
      <span class="dbadge db-accent">${d.size}</span>
      <span class="dbadge ${d.podium==="Да"?"db-yes":"db-blue"}">${d.podium==="Да"?"✓ Опыт подиума":"Без опыта подиума"}</span>
      ${hasTat?`<span class="dbadge db-no">Татуировки</span>`:""}`;
    function pLinks(arr,lbl){return buildPhotoViewer(arr,lbl);}
    fields=`
      <div class="field"><div class="field-label">Дата рождения</div><div class="field-value">${d.dob}</div></div>
      <div class="field"><div class="field-label">Город</div><div class="field-value">${d.city}</div></div>
      <div class="field"><div class="field-label">Одежда / обувь</div><div class="field-value">${d.clothes}</div></div>
      <div class="field"><div class="field-label">Тип внешности</div><div class="field-value">${d.look}</div></div>
      <div class="field full"><div class="field-label">Татуировки / пирсинг</div><div class="field-value">${d.tattoo}</div></div>
      <div class="field full"><div class="field-label">Портрет</div><div class="field-value"><div class="photo-links">${pLinks(d.portrait,"Портрет")}</div></div></div>
      <div class="field full"><div class="field-label">Полный рост</div><div class="field-value"><div class="photo-links">${pLinks(d.full_photo,"Фото")}</div></div></div>
      <div class="field full"><div class="field-label">Образ (по желанию)</div><div class="field-value"><div class="photo-links">${d.style_photo&&d.style_photo.length&&d.style_photo[0]?pLinks(d.style_photo,"Образ"):`<span class="no-photo">—</span>`}</div></div></div>
      <div class="field full"><div class="field-label">Контакты</div><div class="field-value" style="white-space:pre-line;font-size:12px">${d.contacts}</div></div>`;
  }

  const total=filtered.length;
  document.getElementById("detail").innerHTML=`
    <div class="detail-header">
      <div class="detail-av-row">
        <div class="detail-av" style="background:${av.bg};color:${av.c}">${ini(d.name)}</div>
        <div>
          <div class="detail-name">${d.name}</div>
          <div class="detail-ts">${d.ts}</div>
          <div class="detail-badges">${badges}</div>
        </div>
      </div>
    </div>
    <div class="fields">${fields}</div>
    <div class="nav-arrows">
      <button class="arrow-btn" onclick="go(-1)" ${i===0?"disabled":""}>← Назад</button>
      <button class="arrow-btn" onclick="go(1)" ${i===total-1?"disabled":""}>Вперёд →</button>
      <div class="arrow-pos">${i+1} / ${total}</div>
    </div>`;
}

function go(dir){
  const ni=curIdx+dir;
  if(ni>=0&&ni<filtered.length) selectPerson(ni);
}

// Init
filtered=[...designers];
renderList();
renderDetail(filtered[0],0);
</script>
